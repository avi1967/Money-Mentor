services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: money_mentor_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: money_mentor_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
